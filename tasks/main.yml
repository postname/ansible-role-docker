---
- name: Installeer vereiste pakketten voor Docker
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - python3-debian  # Vereist voor de deb822_repository module
    state: present
    update_cache: true

- name: Voeg Docker repository toe (deb822 formaat)
  ansible.builtin.deb822_repository:
    name: docker
    types: deb
    uris: https://download.docker.com/linux/ubuntu
    suites: "{{ ansible_distribution_release }}"
    components: stable
    architectures: amd64
    # De module downloadt en installeert de GPG key nu automatisch vanaf deze URL!
    signed_by: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Installeer Docker Engine
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true
  notify: Herstart Docker

- name: Zorg dat de groep 'docker' bestaat
  ansible.builtin.group:
    name: docker
    state: present

- name: Voeg opgegeven gebruikers toe aan de docker groep
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"
  when: docker_users | length > 0
  